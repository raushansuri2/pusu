version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: quotingtool_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: quotingtool
      MYSQL_USER: cakephp
      MYSQL_PASSWORD: quotingtool123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./config/schema:/docker-entrypoint-initdb.d
    networks:
      - quotingtool_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: quotingtool_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root123
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - quotingtool_network

volumes:
  mysql_data:

networks:
  quotingtool_network:
    driver: bridge
